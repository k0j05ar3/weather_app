<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="icon" type="image/x-icon" href="/assets/icon.ico">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div id="app">
        <section id="weatherCard">

            <div id="searchBar">
                <input type="text" id="cityInput" name="name" placeholder="Enter city name">
                <button id="searchBtn">Search</button>
            </div>

            <h1 id="cityName">City Name</h1>
            <img id="weatherIcon" src="https://cdn.weatherapi.com/weather/64x64/day/116.png" alt="Weather Icon">

            <h2 id="temperature">--°F</h2>
            <p id="date">--</p>

        </section>
    </div>
    <script src="/scripts.js"></script>
</body>
</html>
